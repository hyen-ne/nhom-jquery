<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="../../css/taikhoan.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body style="background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('../../images/taikhoan/LoginBackground.png'); background-size: cover; background-position: center; background-repeat: no-repeat;">
    
    <a href="../../index.html" class="back-btn">&#8592;</a>

    <div class="container">
        <div class="form-box">
            <form action="">
                <h2>Đăng ký</h2>

                <input type="text" name="fullname" placeholder="Họ và tên" required>
                <input type="email" name="email" placeholder="Địa chỉ Email" required>
                <input type="password" name="password" placeholder="Mật khẩu" required>
                <input type="password" name="confirm-password" placeholder="Xác nhận mật khẩu" required>

                <button type="submit">Tạo tài khoản</button>

                <div class="form-footer">
                    <p>Đã có tài khoản? <a href="dangnhap.html">Đăng nhập ngay</a></p>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
